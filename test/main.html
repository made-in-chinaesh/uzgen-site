<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./main.css">
    <title>Welcome to Ozgon site!</title>
</head>
<body>
    <header>
        <div class="container nav">
            <span class="title">Узген</span>

            <ul>
                <a href="#">
                    <li>Главная</li>
                </a>

                <a href="./celo.html">
                    <li>Сельское хозяйство</li>
                </a>

                <a href="./okmot.html">
                    <li>Сельская управа</li>
                </a>

                <a href="./opros.html">
                    <li>Вопросы</li>
                </a>
            </ul>

            <button class="btn login-btn" onclick="handleAuth()">Войти</button>
        </div>
    </header>


    <main class="container">
        <div class="task-form">
            <h2>Создать задание</h2>

            <input type="text" id="taskTitle" class="input" placeholder="Название задания">

            <textarea id="taskDesc" class="input" placeholder="Описание"></textarea>

            <input type="date" id="taskDeadline" class="input">

            <input type="file" id="taskFile" class="input">

            <!-- 👇 ВОТ ЗДЕСЬ SELECT -->
            <select id="taskToUser" class="input">
                <option value="">Выберите пользователя</option>
            </select>

            <button class="btn" onclick="createTask()">Создать</button>
        </div>

        <h2>Задания</h2>
        <div id="tasksList"></div>  
    </main>

        <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Авторизация</h2>

            <input type="text" id="loginInput" class="input" placeholder="Логин">
            <input type="password" id="passwordInput" class="input" placeholder="Пароль">

            <button class="btn" onclick="login()">Войти</button>
            <button class="btn close-btn" onclick="closeLogin()">Закрыть</button>

            <p id="error" class="error"></p>
        </div>
    </div>

    <script src="./index.js"></script>
    <script src="./main.js"></script>

</body>
</html>
