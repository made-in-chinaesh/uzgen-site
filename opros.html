<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./opros.css">
    <title>Welcome to Ozgon site!</title>
</head>
<body>
    
    <header>
        <div class="container nav">
            <span class="title">Узген</span>

            <ul>
                <a href="./index.html">
                    <li>Главная</li>
                </a>

                <a href="./celo.html">
                    <li>Сельское хозяйство</li>
                </a>

                <a href="./okmot.html">
                    <li>Сельская управа</li>
                </a>

                <a href="./opros.html">
                    <li>Вопросы</li>
                </a>
            </ul>

            <button class="btn login-btn" onclick="handleAuth()">Войти</button>
        </div>
    </header>

<main class="container">
    <h1 class="title">Форум</h1>

    <div class="question-form">
        <input type="text" id="questionInput" class="input" placeholder="Введите вопрос">
        <button class="button" onclick="addQuestion()">Добавить форум</button>
    </div>

    <h2>Обсуждение</h2>
    <div id="questionsList" class="questions-list"></div>
</main>



    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Авторизация</h2>

            <input type="text" id="loginInput" class="input" placeholder="Логин">
            <input type="password" id="passwordInput" class="input" placeholder="Пароль">

            <button class="btn" onclick="login()">Войти</button>
            <button class="btn close-btn" onclick="closeLogin()">Закрыть</button>

            <p id="error" class="error"></p>
        </div>
    </div>


<script src="./index.js"></script>
<script src="./opros.js"></script>



</body>
